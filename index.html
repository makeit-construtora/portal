<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APTA IMOB — Portal de Construtoras</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&amp;family=Inter:wght@300;400;500&amp;family=Playfair+Display:wght@400;600&amp;family=Lato:wght@300;400;700&amp;family=Montserrat:wght@300;400;500&amp;family=Raleway:wght@300;400;500&amp;family=Merriweather:wght@300;400;700&amp;family=Poppins:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:          #E8E2D8;
  --card-bg:     #FFFFFF;
  --accent:      #9A7B4F;
  --accent-pale: #F0E8D8;
  --header-bg:   #1C1A17;
  --header-text: #FAF8F4;
  --text:        #1C1A17;
  --text-mid:    #5C5650;
  --text-light:  #9C9690;
  --border:      #D4CCC0;
  --radius:      14px;
  --body-font:   'Inter', sans-serif;
  --title-font:  'Cormorant Garamond', serif;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.10);
  --header-pad:  36px;
  --page-pad:    36px;
  --card-pad:    20px;
  --card-gap:    14px;
  --logo-size:         30px;
  --section-title-size:26px;
  --card-name-size:    20px;
  --link-name-size:    14px;
}

body { background:var(--bg); color:var(--text); font-family:var(--body-font); min-height:100vh; }

.header { background:var(--header-bg); padding:var(--header-pad) 24px; text-align:center; position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:60px; height:2px; background:var(--accent); }
.logo { font-family:var(--title-font); font-size:var(--logo-size); font-weight:600; letter-spacing:6px; color:var(--header-text); text-transform:uppercase; margin-bottom:6px; }
.tagline { font-size:10px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; }

.main { max-width:520px; margin:0 auto; padding:var(--page-pad) 20px 80px; }

.breadcrumb { display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:12px; color:var(--text-light); margin-bottom:28px; min-height:18px; }
.bc-link { color:var(--accent); cursor:pointer; font-weight:500; }
.bc-sep { color:var(--border); }
.bc-current { color:var(--text-mid); }

.screen { display:none; }
.screen.active { display:block; animation:fadeUp .28s ease forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.section-header { margin-bottom:24px; }
.section-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--text-light); margin-bottom:6px; }
.section-title { font-family:var(--title-font); font-size:var(--section-title-size); font-weight:500; color:var(--text); line-height:1.2; }

.builder-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:var(--card-gap); cursor:pointer; transition:box-shadow .2s,border-color .2s,transform .15s; overflow:hidden; display:flex; align-items:stretch; box-shadow:var(--card-shadow); }
.builder-card:hover { border-color:var(--accent); box-shadow:0 6px 24px rgba(0,0,0,.13); transform:translateY(-2px); }
.builder-accent { width:5px; background:var(--accent-pale); flex-shrink:0; transition:background .2s; }
.builder-card:hover .builder-accent { background:var(--accent); }
.builder-body { flex:1; padding:var(--card-pad) var(--card-pad) var(--card-pad) 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.builder-name { font-family:var(--title-font); font-size:var(--card-name-size); font-weight:500; color:var(--text); margin-bottom:3px; }
.builder-count { font-size:12px; color:var(--text-light); }
.builder-arrow { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:16px; flex-shrink:0; transition:background .2s,border-color .2s; }
.builder-card:hover .builder-arrow { background:var(--accent); border-color:var(--accent); color:white; }

.emp-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:var(--card-pad); margin-bottom:var(--card-gap); cursor:pointer; transition:box-shadow .2s,border-color .2s,transform .15s; display:flex; align-items:center; justify-content:space-between; gap:12px; box-shadow:var(--card-shadow); }
.emp-card:hover { border-color:var(--accent); box-shadow:0 4px 18px rgba(0,0,0,.11); transform:translateY(-2px); }
.emp-info { flex:1; }
.emp-name { font-family:var(--title-font); font-size:var(--card-name-size); font-weight:500; color:var(--text); margin-bottom:4px; }
.emp-tags { display:flex; gap:8px; flex-wrap:wrap; }
.tag { font-size:11px; color:var(--text-mid); background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:2px 10px; }
.emp-arrow { color:var(--accent); font-size:20px; opacity:.5; transition:opacity .2s,transform .2s; flex-shrink:0; }
.emp-card:hover .emp-arrow { opacity:1; transform:translateX(4px); }

.links-grid { display:flex; flex-direction:column; gap:var(--card-gap); }
.link-card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:var(--card-pad); display:flex; align-items:center; gap:16px; text-decoration:none; transition:box-shadow .2s,border-color .2s,transform .15s; box-shadow:var(--card-shadow); }
.link-card:hover { border-color:var(--accent); box-shadow:0 4px 16px rgba(0,0,0,.11); transform:translateY(-2px); }
.link-icon-wrap { width:44px; height:44px; background:var(--accent-pale); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.link-info { flex:1; }
.link-name { font-size:var(--link-name-size); font-weight:500; color:var(--text); margin-bottom:2px; }
.link-desc { font-size:12px; color:var(--text-light); }
.link-ext { font-size:13px; color:var(--text-light); opacity:.6; flex-shrink:0; }
.link-card:hover .link-ext { opacity:1; color:var(--accent); }

.empty-state { text-align:center; padding:40px 20px; color:var(--text-light); font-size:13px; }

</style>
<style id="user-overrides">
:root {
  --title-font: 'Inter', sans-serif;
  --page-pad: 12px;
}
</style>
</head>

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

const navHistory = ['home'];

function labelFor(id) {
  if (id === 'home') return 'Início';
  for (const b of portalData.builders) {
    if (b.id === id) return b.name;
    for (const d of b.developments) {
      if (d.id === id) return d.name;
    }
  }
  return id;
}

function renderHeader() {
  document.getElementById('txt-logo').textContent = portalData.header.logo;
  document.getElementById('txt-tagline').textContent = portalData.header.tagline;
}

function renderScreens() {
  const container = document.getElementById('screens-container');
  let html = '';

  html += `<div class="screen active" id="screen-home">
    <div class="section-header">
      <div class="section-label">${escapeHtml(portalData.header.welcomeLabel)}</div>
      <div class="section-title">${escapeHtml(portalData.header.welcomeTitle)}</div>
    </div>`;
  portalData.builders.forEach(b => {
    html += `<div class="builder-card" onclick="goTo('${b.id}')">
      <div class="builder-accent"></div>
      <div class="builder-body">
        <div>
          <div class="builder-name">${escapeHtml(b.name)}</div>
          <div class="builder-count">${escapeHtml(b.subtitle)}</div>
        </div>
        <div class="builder-arrow">›</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  portalData.builders.forEach(b => {
    html += `<div class="screen" id="screen-${b.id}">
      <div class="section-header">
        <div class="section-label">${escapeHtml(b.name)}</div>
        <div class="section-title">Empreendimentos</div>
      </div>`;
    b.developments.forEach(d => {
      html += `<div class="emp-card" onclick="goTo('${d.id}')">
        <div class="emp-info">
          <div class="emp-name">${escapeHtml(d.name)}</div>
          <div class="emp-tags">${d.tags.filter(t=>t).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
        </div>
        <div class="emp-arrow">›</div>
      </div>`;
    });
    html += `</div>`;

    b.developments.forEach(d => {
      html += `<div class="screen" id="screen-${d.id}">
        <div class="section-header">
          <div class="section-label">${escapeHtml(b.name)}</div>
          <div class="section-title">${escapeHtml(d.name)}</div>
        </div>
        <div class="links-grid">`;
      d.links.forEach(l => {
        html += `<a class="link-card" href="${escapeAttr(l.href)}" target="_blank" rel="noopener">
          <div class="link-icon-wrap">${escapeHtml(l.icon)}</div>
          <div class="link-info">
            <div class="link-name">${escapeHtml(l.name)}</div>
            <div class="link-desc">${escapeHtml(l.desc)}</div>
          </div>
          <div class="link-ext">↗</div>
        </a>`;
      });
      html += `</div></div>`;
    });
  });

  container.innerHTML = html;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  if (el) el.classList.add('active');
  updateBreadcrumb();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goTo(id) { navHistory.push(id); showScreen(id); }
function goBack(i) { navHistory.splice(i + 1); showScreen(navHistory[navHistory.length - 1]); }

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (!bc) return;
  if (navHistory.length <= 1) { bc.innerHTML = ''; return; }
  bc.innerHTML = navHistory.map((h, i) =>
    i === navHistory.length - 1
      ? `<span class="bc-current">${escapeHtml(labelFor(h))}</span>`
      : `<span class="bc-link" onclick="goBack(${i})">${escapeHtml(labelFor(h))}</span>`
  ).join('<span class="bc-sep"> › </span>');
}

renderHeader();
renderScreens();
updateBreadcrumb();

</script>
